<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VeloStream Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f4f4f5; color: #1f2937; }
    .container { max-width: 600px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .upload-btn { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 4px; }
    .upload-btn:hover { background: #2563eb; }
    video { width: 100%; margin-top: 2rem; background: #000; border-radius: 8px; aspect-ratio: 16/9; }
    .input-row { display: flex; gap: 0.5rem; }
    .upload-hint { margin: 0.3rem 0 0.8rem; color: #6b7280; font-size: 0.9rem; }
    /* System Status Drawer */
    #devDrawer { position: fixed; right: 0; top: 0; bottom: 0; width: 300px; background: #111; color: #0f0; font-family: 'Courier New', Courier, monospace; padding: 1rem; box-shadow: -2px 0 5px rgba(0,0,0,0.5); overflow-y: auto; transform: translateX(100%); transition: transform 0.3s ease; }
    #devDrawer.open { transform: translateX(0); }
    #devDrawer h3 { color: #fff; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
    .drawer-toggle { position: fixed; right: 20px; bottom: 20px; background: #333; color: #fff; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; z-index: 1000; font-family: monospace;}
    .drawer-toggle:hover { background: #555; }
    .status-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
    .badge-PENDING    { background-color: #d1d5db; }
    .badge-PROCESSING { background-color: #3b82f6; animation: pulse 1s infinite alternate; }
    .badge-COMPLETED  { background-color: #10b981; }
    .badge-FAILED     { background-color: #ef4444; }
    @keyframes pulse { from { opacity: 1; transform: scale(1); } to { opacity: 0.6; transform: scale(1.2); } }
    .drawer-section { margin-bottom: 1.5rem; }
    .drawer-section p { margin: 0.2rem 0; font-size: 0.9rem; }
    .clear-btn { background: #ef4444; color: white; border: none; padding: 0.3rem 0.5rem; cursor: pointer; border-radius: 3px; font-family: monospace; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <button class="drawer-toggle" onclick="document.getElementById('devDrawer').classList.toggle('open')">Toggle Dev Mode</button>
  <div id="devDrawer">
    <h3>System Status</h3>
    
    <div class="drawer-section">
      <strong>Storage Health:</strong> <span id="storageHealth">...</span>
    </div>

    <div class="drawer-section">
      <strong>Pipeline (from DB):</strong>
      <p>Waiting (PENDING): <span id="qWaiting">0</span></p>
      <p>Active (PROCESSING): <span id="qActive">0</span></p>
      <p>Completed: <span id="qCompleted">0</span></p>
      <p>Failed: <span id="qFailed">0</span></p>
      <button class="clear-btn" id="resetBtn">Reset System</button>
    </div>

    <div class="drawer-section">
      <strong>Recent Videos:</strong>
      <div id="recentVideosList"></div>
    </div>
  </div>

  <div class="container">
    <h1>🚀 VeloStream Flow</h1>
    
    <label>1. Select a video file</label><br/>
    <input type="file" id="videoInput" accept="video/mp4" />
    <p class="upload-hint">Max file size: 15MB</p>
    <button id="uploadBtn" class="upload-btn">Upload</button>

    <div id="status" style="margin-top: 1rem; color: #6b7280; font-style: italic;">Ready</div>

    <h2 style="margin-top: 2rem;">2. Watch Output</h2>
    <div class="input-row">
      <input type="text" id="streamUrl" placeholder="http://localhost:9000/velostream-uploads/..." style="flex: 1; padding:0.5rem; border-radius: 4px; border: 1px solid #ccc;" />
      <button id="playBtn" class="upload-btn" style="margin-top: 0;">Play</button>
    </div>
    
    <video id="videoPlayer" controls></video>
  </div>

  <script>
    const elStatus = document.getElementById('status');
    const MAX_FILE_SIZE_BYTES = 15 * 1024 * 1024;
    let testUserId = null;

    const fileInputEl = document.getElementById('videoInput');

    function validateSelectedFile(file) {
      if (!file) return false;
      if (file.size > MAX_FILE_SIZE_BYTES) {
        alert('File is too large. Maximum allowed size is 15MB.');
        fileInputEl.value = '';
        elStatus.innerText = 'Error: Selected file exceeds 15MB limit.';
        return false;
      }
      return true;
    }

    fileInputEl.addEventListener('change', (event) => {
      const selectedFile = event.target.files[0];
      if (selectedFile) {
        validateSelectedFile(selectedFile);
      }
    });

    // 1. Fetch the seeded test user ON LOAD
    fetch('/internal/test-user')
      .then(res => res.json())
      .then(data => {
        if (data.id) {
          testUserId = data.id;
          elStatus.innerText = `Ready (Logged in as ${data.email})`;
        } else {
          elStatus.innerText = 'Error: Test user not found. Did you seed the DB?';
        }
      })
      .catch(err => elStatus.innerText = 'Error fetching user: ' + err);

    // 2. Handle Upload
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const file = fileInputEl.files[0];
      
      if (!file) return alert('Please select a file first.');
      if (!validateSelectedFile(file)) return;
      if (!testUserId) return alert('User ID not loaded. Please wait and try again.');

      try {
        elStatus.innerText = 'Requesting upload URL...';
        
        // A. Request Presigned URL
        const initRes = await fetch('/uploads/initiate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fileName: file.name,
            fileSize: file.size,
            contentType: file.type || 'video/mp4',
            userId: testUserId
          })
        });
        
        const { uploadUrl, videoId } = await initRes.json();
        
        if (!uploadUrl) throw new Error('Failed to get upload URL');

        elStatus.innerText = 'Uploading to MinIO directly...';

        // B. Upload file to MinIO
        const uploadRes = await fetch(uploadUrl, {
          method: 'PUT',
          body: file,
          headers: {
            'Content-Type': file.type || 'video/mp4'
          }
        });

        if (!uploadRes.ok) throw new Error('Upload failed with status ' + uploadRes.status);

        elStatus.innerText = 'Confirming upload and starting pipeline...';
        const ackRes = await fetch(`/uploads/${videoId}/ack`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: testUserId })
        });
        const ackBody = await ackRes.json().catch(() => ({}));
        if (!ackRes.ok) {
          throw new Error(ackBody.error || 'Upload ack failed with status ' + ackRes.status);
        }

        elStatus.innerText = 'Upload complete! Waiting for transcode (check Rust output logs)...';

        // Suggest the HLS URL it will eventually generate
        // Based on the code, Rust produces transcoded/videoId/playlist.m3u8 in the velostream-public bucket
        // We can pre-fill the stream URL for convenience.
        const predictedUrl = `http://localhost:9000/velostream-public/transcoded/${videoId}/playlist.m3u8`;
        document.getElementById('streamUrl').value = predictedUrl;

      } catch (err) {
        console.error(err);
        elStatus.innerText = `Error: ${err.message}`;
      }
    });

    // 3. Handle Playback
    document.getElementById('playBtn').addEventListener('click', () => {
      const url = document.getElementById('streamUrl').value;
      const video = document.getElementById('videoPlayer');
      
      if (!url) return alert('Please enter an HLS stream URL');

      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          video.play();
        });
        // Detailed Error handling
        hls.on(Hls.Events.ERROR, function (event, data) {
           console.warn('HLS Error Event:', data);
           if (data.fatal) {
              switch (data.type) {
                case Hls.ErrorTypes.NETWORK_ERROR:
                  console.error('Fatal network error encountered, try to recover.');
                  elStatus.innerText = 'Network error fetching stream (Check CORS or 404).';
                  hls.startLoad();
                  break;
                case Hls.ErrorTypes.MEDIA_ERROR:
                  console.error('Fatal media error encountered, try to recover.');
                  elStatus.innerText = 'Media error (corrupt segment).';
                  hls.recoverMediaError();
                  break;
                default:
                  console.error('Fatal unrecoverable error.');
                  elStatus.innerText = 'Unrecoverable stream error.';
                  hls.destroy();
                  break;
              }
           }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', function() {
          video.play();
        });
      }
    });

    // 4. System Health Polling (Dev Mode)
    async function fetchSystemHealth() {
      try {
        const res = await fetch('/internal/system-health');
        if (!res.ok) return;
        const data = await res.json();
        
        document.getElementById('storageHealth').innerText = data.storageHealthy ? '✅ Online' : '❌ Offline';

        if (data.pipelineStats) {
          document.getElementById('qWaiting').innerText = data.pipelineStats.waiting ?? 0;
          document.getElementById('qActive').innerText = data.pipelineStats.active ?? 0;
          document.getElementById('qCompleted').innerText = data.pipelineStats.completed ?? 0;
          document.getElementById('qFailed').innerText = data.pipelineStats.failed ?? 0;
        }

        if (data.recentVideos) {
          const list = document.getElementById('recentVideosList');
          list.innerHTML = data.recentVideos.map(v => 
            `<p title="ID: ${v.id}"><span class="status-badge badge-${v.status}"></span>${v.originalFileName || 'Unknown'} (${v.status})</p>`
          ).join('');
        }
      } catch (err) {
        console.error('Failed to fetch system health', err);
      }
    }

    setInterval(fetchSystemHealth, 3000);
    fetchSystemHealth();

    document.getElementById('resetBtn').addEventListener('click', async () => {
      if (confirm('Delete ALL videos and flush queues? This cannot be undone.')) {
        const res = await fetch('/internal/reset', { method: 'POST' });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          alert('Reset failed: ' + (body.error || res.status));
        } else {
          if (body.warnings?.length) alert('Reset done (warnings): ' + body.warnings.join(', '));
          fetchSystemHealth();
        }
      }
    });
  </script>
</body>
</html>
