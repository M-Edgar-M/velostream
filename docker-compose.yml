services:
  api:
    build:
      context: ./velostream-api
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    # Ensure variables are explicitly passed if the code isn't picking up the file
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://user:password@postgres:5432/velostream
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - velostream_net

  worker:
    build:
      context: ./transcode-engine
    env_file:
      - .env.docker
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - velostream_net

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: velostream
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d velostream" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velostream_net

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker/minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velostream_net

  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - velostream_net
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/velostream-uploads --ignore-existing;
      /usr/bin/mc anonymous set public myminio/velostream-uploads;
      /usr/bin/mc mb myminio/velostream-public --ignore-existing;
      /usr/bin/mc anonymous set public myminio/velostream-public;
      exit 0;
      "

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    # Keep the mapping 6380:6379 so you can see it from your host machine
    ports:
      - "6380:6379"
    volumes:
      - ./docker/redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velostream_net

networks:
  velostream_net:
    driver: bridge
